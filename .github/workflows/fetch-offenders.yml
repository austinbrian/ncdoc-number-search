name: Fetch Offender Records

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of records to fetch (0 = all remaining)'
        required: false
        default: '100'
      delay_ms:
        description: 'Delay between requests in ms'
        required: false
        default: '1000'
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install jsdom

      - name: Download current dataset from R2
        run: |
          curl -sf "${{ vars.WORKER_URL }}/data/dataset.json" -o data/dataset.json || echo '{}' > data/dataset.json
          TOTAL=$(node -e "const d=JSON.parse(require('fs').readFileSync('data/dataset.json','utf-8')); console.log(Object.keys(d).length)")
          echo "Existing dataset has ${TOTAL} entries"

      - name: Fetch offender records
        env:
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '100' }}
          DELAY_MS: ${{ github.event.inputs.delay_ms || '1000' }}
        run: node scripts/fetch-offenders.mjs

      - name: Clean early reentry dates
        run: node scripts/clean-early-reentries.mjs

      - name: Upload dataset to R2
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ secrets.UPLOAD_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @data/dataset.json \
            "${{ vars.WORKER_URL }}/data/dataset.json"
          echo "Dataset uploaded to R2"
